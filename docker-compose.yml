services:
  anti-api:
    build:
      context: .
      args:
        BUN_IMAGE: ${BUN_IMAGE:-ghcr.io/oven-sh/bun:1.3.5}
    ports:
      - "8964:8964"
      - "1455-1465:1455-1465"
      - "51121-51131:51121-51131"
    environment:
      ANTI_API_DATA_DIR: /app/data
      ANTI_API_OAUTH_NO_OPEN: "1"
      ANTI_API_NO_OPEN: "1"
      ANTI_API_PACKAGE_MANAGER: docker
      ANTI_API_NO_SELF_UPDATE: "1"
    volumes:
      - ${HOME}/.anti-api:/app/data
      # Optional read-only host credentials for local-import providers.
      # Uncomment only the providers you want Docker to import from the host.
      # - ${HOME}/.codex:/app/data/.codex:ro
      # - ${HOME}/.cli-proxy-api:/app/data/.cli-proxy-api:ro
      # - ${HOME}/.aws:/app/data/.aws:ro
      # - ${HOME}/.local/share/kiro-cli:/app/data/.local/share/kiro-cli:ro
      # - ${HOME}/.local/share/amazon-q:/app/data/.local/share/amazon-q:ro
    restart: unless-stopped
